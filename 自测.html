var answered = new Array(data.length).fill(null);
var correct = 0;
var chapters = {};
data.forEach(function(q,i){if(!chapters[q.ch])chapters[q.ch]=[];chapters[q.ch].push(i)});
function render(){
 var kw=document.getElementById("search").value.toLowerCase();
 var h="";
 Object.keys(chapters).forEach(function(ch){
  var ids=chapters[ch].filter(function(i){return data[i].q.toLowerCase().includes(kw)});
  if(!ids.length)return;
  h+="<div class="chapter-block"><div class="chapter-title">"+ch+"</div>";
  ids.forEach(function(i){
   var qq=data[i],ans=answered[i],oh="",letters=["A","B","C","D"];
   qq.opts.forEach(function(opt,oi){
    var cls="opt";
    if(ans!==null){cls+=" disabled";if(oi===qq.ans)cls+=" reveal";if(ans===oi&&oi!==qq.ans)cls+=" wrong"}
    oh+="<div class=""+cls+"" onclick="select("+i+","+oi+")">"+letters[oi]+". "+opt+"</div>";
   });
   h+="<div class="q-item"><div class="q-text"><span class="q-num">"+(i+1)+"</span>"+qq.q+"</div>"+oh+"</div>";
  });
  h+="</div>";
 });
 document.getElementById("content").innerHTML=h;
}
function select(qi,oi){
 if(answered[qi]!==null)return;
 answered[qi]=oi;
 if(oi===data[qi].ans)correct++;
 document.getElementById("score").textContent="答对 "+correct+"/"+data.length;
 render();
}
function resetAll(){
 for(var i=0;i<answered.length;i++)answered[i]=null;
 correct=0;
 document.getElementById("score").textContent="答对 0/"+data.length;
 render();
}
function showAll(){
 for(var i=0;i<answered.length;i++){if(answered[i]===null){answered[i]=data[i].ans;correct++;}}
 document.getElementById("score").textContent="答对 "+correct+"/"+data.length;
 render();
}
function filterQ(){render()}
render();
</script></body></html>
