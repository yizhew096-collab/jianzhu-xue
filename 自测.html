aw": ["A. 水泥砂浆 B. 石灰砂浆 C. 混合砂浆 D. 粘土砂浆"], "ans": "C"}, {"ch": "第六章  墙体", "q": "图中砖墙的组砌方式是（    ）。", "raw": ["A. 梅花丁     B. 多顺一丁     C. 一顺一丁      D. 全顺式"], "ans": "A"}, {"ch": "第六章  墙体", "q": "施工规范规定的砖墙竖向灰缝宽度为（    ）。", "raw": ["A. 6-8mm B. 7-9mm C. 10-12mm D. 8-12mm"], "ans": "D"}, {"ch": "第六章  墙体", "q": "墙与柱和屋架必须有可靠的连接，常用做法是沿柱高每(     )mm平行伸出两根Φ6钢筋砌入砌体水平灰缝中。", "raw": ["A. 800～1000    B. 500～600    C. 300～400    D. 900"], "ans": "D"}, {"ch": "第六章  墙体", "q": "散水的构造做法，下列哪种是不正确的（    ）。", "raw": ["A. 在素土夯实上做60～100mm厚混凝土，其上再做5%的水泥砂浆抹面。", "B. 散水宽度一般为600～1000mm。", "C. 散水与墙体之间应整体连接，防止开裂。", "D. 散水宽度比采用自由落水的屋顶檐口多出200mm左右。"], "ans": "C"}, {"ch": "第六章  墙体", "q": "用标准砖砌筑的墙体，下列哪个墙段长度会出现非正常砍砖（    ）。", "raw": ["A. 490 B. 620 C. 740 D. 1100"], "ans": "D"}, {"ch": "第六章  墙体", "q": "图中砖墙的组砌方式是（    ）。", "raw": ["A. 梅花丁", "B. 多顺一丁", "C. 一顺一丁", "D. 全顺式"], "ans": "B"}, {"ch": "第六章  墙体", "q": "墙与柱和屋架必须有可靠的连接，常用做法是沿柱高每(    )mm平行伸出两根Φ6钢筋砌入砌体水平灰缝中。", "raw": ["A. 800～1000    B. 500～600    C. 300～400    D. 900"], "ans": "B"}, {"ch": "第六章  墙体", "q": "圈梁遇洞口中断，所设的附加圈梁与原圈梁的搭接长度应满足（    ）。", "raw": ["A．≤2h且≤1000mm       B. ≤4h且 ≤1500mm", "C. ≥2h且(1000mm        D. ≥h且 ≥1500mm"], "ans": "C"}, {"ch": "第六章  墙体", "q": "在下列隔墙中，适用于卫生间隔墙的有(    )。", "raw": ["(1)轻钢龙骨纸面石膏板隔墙 (2)砖砌隔墙", "(3)木龙骨灰板条隔墙 (4)轻钢龙骨钢板网抹灰隔墙", "A.(1)(2)    B.(2)(4)    C.(1)(4)    D.(3)(4)"], "ans": "B"}];
var answered = new Array(data.length).fill(-1);
var correct = 0;
var chapters = {};
var cn = "①②③④";
var lm = {A:0,B:1,C:2,D:3,E:4};
var cm = {"①":0,"②":1,"③":2,"④":3};

data.forEach(function(q,i){
  var opts = [];
  var hc = false;
  for(var r=0;r<q.raw.length;r++){for(var c=0;c<cn.length;c++){if(q.raw[r].indexOf(cn[c])!==-1){hc=true;break}}if(hc)break}
  if(hc){
    for(var r=0;r<q.raw.length;r++){
      var pts = q.raw[r].split(/([①②③④])/);
      var bf = "";
      for(var p=0;p<pts.length;p++){
        if(pts[p].length===1&&cn.indexOf(pts[p])!==-1){if(bf.trim())opts.push(bf.trim());bf=pts[p]}
        else bf+=pts[p]
      }
      if(bf.trim())opts.push(bf.trim());
    }
    for(var o=0;o<opts.length;o++){opts[o]=opts[o].replace(/^[①②③④][、．)]?\s*/,"").trim()}
  }else{
    for(var r=0;r<q.raw.length;r++){var ot=q.raw[r].replace(/^[A-Da-d][、．).]?\s*/,"").trim();if(ot)opts.push(ot)}
  }
  q.opts = opts;
  var a = q.ans.trim();
  q.ai = (lm[a]!==undefined)?lm[a]:(cm[a]!==undefined?cm[a]:0);
  if(!chapters[q.ch])chapters[q.ch]=[];chapters[q.ch].push(i);
});

function render(){
  var kw=document.getElementById("search").value.toLowerCase();
  var h="";
  Object.keys(chapters).forEach(function(ch){
    var ids=chapters[ch].filter(function(i){return data[i].q.toLowerCase().includes(kw)});
    if(!ids.length)return;
    h+="<div class='chapter-block'><div class='chapter-title'>"+ch+"</div>";
    ids.forEach(function(j){
      var qq=data[j],a=answered[j],oh="";
      for(var o=0;o<qq.opts.length;o++){
        var cls="opt";
        if(a!==-1){cls+=" disabled";if(o===qq.ai)cls+=" reveal";if(a===o&&o!==qq.ai)cls+=" wrong"}
        oh+="<div class='"+cls+"' data-qi='"+j+"' data-oi='"+o+"'>"+String.fromCharCode(65+o)+". "+qq.opts[o]+"</div>"
      }
      h+="<div class='q-item'><div class='q-text'><span class='q-num'>"+(j+1)+"</span>"+qq.q+"</div>"+oh+"</div>"
    });
    h+="</div>";
  });
  document.getElementById("content").innerHTML=h;
}

document.getElementById("content").addEventListener("click",function(e){
  var el = e.target;
  if(!el.classList.contains("opt")||el.classList.contains("disabled"))return;
  var qi=parseInt(el.getAttribute("data-qi"));
  var oi=parseInt(el.getAttribute("data-oi"));
  answered[qi]=oi;
  if(oi===data[qi].ai)correct++;
  document.getElementById("score").textContent="答对 "+correct+"/"+data.length;
  render();
});

function resetAll(){for(var i=0;i<answered.length;i++)answered[i]=-1;correct=0;document.getElementById("score").textContent="答对 0/"+data.length;render()}
function showAll(){for(var i=0;i<answered.length;i++){if(answered[i]===-1){answered[i]=data[i].ai;correct++}}document.getElementById("score").textContent="答对 "+correct+"/"+data.length;render()}
function filterQ(){render()}
render();
</script>
