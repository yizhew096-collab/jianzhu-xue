<script>
var data = [{"ch":"第一章 民用建筑设计","q":"构成建筑的三要素之间的辩证关系是什么？","a":"构成建筑的三要素中，建筑功能是主导因素，它对建筑技术和建筑形象起决定作用。建筑技术是建造房屋的手段，它对功能又起约束和促进的作用。建筑形象是功能和技术的反应，在相同的功能要求和建筑技术条件下，如果能充分发挥设计者的主观作用，可以创造出不同的建筑形象，达到不同的美学效果。"},{"ch":"第一章 民用建筑设计","q":"实行建筑模数协调统一标准有何意义？模数、基本模数、扩大模数、分模数的含义是什么?模数数列的含义和适用范围是什么?","a":"实行建筑模数协调统一标准的意义是：为了使建筑制品、建筑构配件和组合件实现工业化大规模生产，使不同材料、不同形式和不同制造方法的建筑构配件、组合件符合模数并具有较大的通用性和互换性，以加快设计速度，提高施工质量和效率，降低建筑造价。 模数指选定的尺寸单位，作为尺度协调中的增值单位。 基本模数是模数协调中选用的基本尺寸单位。基本模数的数值为 100 mm，其符号为 M， 即 1M=1OO m。 扩大模数是基本模数的整数倍数。通常分为水平扩大模数和竖向扩大模数，水平扩大模数的基数为3M、 6M、 12M、15M、30M、6OM，其相应尺寸为 300 mm、600 mm、1200 mm、1500 mm、3000 mm、6000 mm；竖向扩大模数的基数为 3M与 6M，其相应尺寸为 300 mm和 600 mm。 分模数是整数除基本模数的数值。分模数的基数为1／10M、l／5M、l／2M，其相应尺寸为 10 mm、20 mm、50 mm。 模数数列指由基本模数、扩大模数、分模数为基础扩展成的一系列尺寸。模数数列的适用范围如下： 水平基本模数的数列幅度为（1～20）M，主要用于门窗洞口和构配件断面尺寸； 竖向基本模数的数列幅度为（1～36）M，主要用于建筑物的层高、门窗洞口和构配件截面等处。 水平扩大模数的数列幅度：3M为（3～75）M、6M为（6～98）M、12M为（12～120）M、15M为（15～120）M、30M为（30～360）M、60M为（60～360）M数列，必要时幅度不限，主要用于建筑物的开间或柱距、进深或跨度、构配件尺寸和门窗洞口等处。 竖向扩大模数数列幅度不限，主要用于建筑物的高度、层高和门窗洞口等处。 分模数的数列幅度：1／1OM为（1/10～2）M、1／5M为（1/5～4）M、1／2M为（1/2～10）M，主要用于缝隙、构造节点、构配件断面尺寸。"},{"ch":"第二章 建筑平面设计","q":"建筑平面包括哪些基本内容？","a":"包括主要使用房间的设计，辅助使用房间的设计，交通联系部分的平面设计及建筑平面组合设计。 包括水平交通联系部分（如：走廊、过道）、垂直交通联系部分（如：楼梯、坡道、电梯、自动扶梯）、交通联系枢纽部分（如：门厅、过厅）。"},{"ch":"第二章 建筑平面设计","q":"墙承重结构的布置方式有哪几种？各有何特点和适用范围是什么？","a":"有横墙承重、纵墙承重、纵横墙混合承重三种。 横墙承重方案：适用于房间的使用面积不大，墙体位置比较固定的建筑，如住宅、宿舍、旅馆等。横墙承重的建筑物整体刚度和抗震性能较好，立面开窗灵活，但平面布置和房间划分的灵活性差。 纵墙承重方案：适用于房间的使用上要求有较大的空间，墙体位置在同层或上下层之间可能有变化的建筑，如教学楼中的教室、阅览室、实验室等。在纵墙承重方案中，由于横墙数量少，房屋刚度差，应适当设置承重横墙，与楼板一起形成纵墙的侧向支撑。 纵横墙承重方案：适用于房间变化较多的建筑，如医院、实验楼等。结构方案可根据需要布置，房屋中一部分用横墙承重，另一部分用纵墙承重，形成纵横墙混合承重方案。此方案建筑组合灵活，空间刚度较好，墙体材料用量较多，适用于开间、进深变化较多的建筑。"},{"ch":"第二章 建筑平面设计","q":"如何确定建筑物的间距？其计算公式是什么？","a":"日照间距的计算一般以当地冬至日正午12时太阳照到后排建筑底层窗台高度为设计依据，来控制建筑的日照距离。 其日照间距的计算公式为：L=H×tagh 式中：L为房屋间距 H为南向房屋前排檐口至后排房屋底层窗台的高度 h为冬至日正午的太阳高度角（当房屋为正南向时）"},{"ch":"第三四章 建筑剖立面设计","q":"试绘图并说明房间净高和层高。","a":"1.房间的净高是指楼地面到结构层（梁、板）底面或顶棚下表面之间的距离。\u000b2.层高是指该层楼地面到上一层楼面之间的距离。"},{"ch":"第五章 建筑构造","q":"建筑物的构造有那几部分组成？各有何作用？","a":"有六大部分组成： 基础 ：建筑物最下部的承重构件,它的作用是把房屋上部的荷载传给地基。 墙体（或柱） ：建筑物垂直方向的承重构件，外墙还起围护作用，内墙起分隔作用墙。 楼板层及地坪层：建筑物水平方向的承重构件，并分隔建筑物的竖向空间。 楼梯： 建筑物的垂直交通构件 屋顶：建筑顶部的承重兼维护构件，承受建筑物上部的荷载并传给墙或柱，且要满足屋顶的保温、隔热、排水、防水等功能。 门窗：提供内外交通、采光、通风、隔离的围护构件。"},{"ch":"第六章 墙体","q":"实体砖墙的组砌方式主要有哪几种？","a":"全顺式、一顺一丁、多顺一丁、每皮一顺一丁（梅花丁）、两平一侧等。"},{"ch":"第六章 墙体","q":"普通粘土砖墙的砖模尺寸与建筑模数是否一致？如何协调二者关系？","a":"普通粘土砖墙的砖模数为 125 mm，建筑的基本模数为 100mm，二者不统一。在工程设计中房屋的开间和进深采用 3M（300 mm），为避免在实际施工中砍砖过多，常采取以下办法：墙体长度小于1.5m时，设计时宜使其符合砖模数，如：115mm、240mm、365 mm、490 mm、615 mm、740mm等；墙段长度大于1.5m时，可不再考虑砖模数，以建筑模数为依据设计。"},{"ch":"第六章 墙体","q":"墙身防潮层的作用是什么？水平防潮层的位置如何确定？什么请款下须设垂直发防潮层？","a":"墙身防潮层的作用是防止土壤中的水分沿基础墙上升，使位于勒脚处的地面水渗入墙内，导致墙身受潮 。 水平防潮层的位置分不透水性地面和垫层及透水性地面和垫层有所不同：对于不透水性地面和垫层，防潮层上表面设置在室内地坪以下60mm处。对于透水性地面和垫层防潮层上表面提高到室内地坪以上60mm处。 垂直防潮层的设置情况是： 相邻房间地面有高差时，应在墙身内设置高低两道水平防潮层，并在靠土壤一侧设置垂直防潮层，以免回填土中的潮气侵入墙身。"},{"ch":"第六章 墙体","q":"窗洞口上部过梁的常用做法有哪几种，各自的适用范围如何？","a":"有三种，即砖拱过梁、钢筋砖过梁和钢筋混凝土过梁。 砖拱过梁适用于洞口跨度为1．8m以内；钢筋砖过梁为2.0m以内。二者不宜用于洞口 上有集中荷载、振动较大、地基土质不均匀或地震区等情况。 钢筋混凝土过梁，具有坚固耐用、施工简便等特点，可用于较大洞口或有集中荷载等情况，目前广泛采用。"},{"ch":"第六章 墙体","q":"圈梁的作用有哪些？设置原则主要有哪些？","a":"圈梁的作用有：（1）加强房屋的整体刚度和稳定性； （2）减轻地基不均匀沉降对房屋的破坏； （3）抵抗地震力的影响。 圈梁的设置原则有： （1）屋盖处必须设置，楼板处视具体情况逐层或隔层设置，当地基不好时在基础顶面也应设置。 （2）圈梁主要沿纵墙设置，内横墙大约10-15m设置一道。 （3）圈梁的设置随抗震设防要求的不同而不同，详见《建筑抗震设计规范》有关规定（略）。"},{"ch":"第六章 墙体","q":"构造柱的作用及加设原则是什么？","a":"作用是与圈梁一起形成封闭骨架，提高砖混结构的抗震能力。 加设原则主要有：（1）外墙转角； （2）内外墙交接处（内纵外横，外纵内横）； （3）楼梯间内墙及较大洞口两侧。"},{"ch":"第六章 墙体","q":"构造柱的构造要点有哪些？","a":"（1）截面尺寸与配筋---截面宜采用240x240mm,最小断面为240x180mm；最小配筋量：主筋4  12，箍筋 6@250,在每层楼面的上下和地圈梁的上部各500mm的范围内         箍筋间距加密为100mm。 （2）构造柱的下部应伸入地圈梁内,无地圈梁时应伸入室外地坪下500mm处；构造柱的上部应伸入顶层圈梁，以形成封闭骨架。 （3）构造柱两侧的墙体应做到“五进五出”，即每300mm高伸出60mm, 每300mm高再收回60mm。构造柱外侧应该有120mm的保护墙。 （4）为加强构造柱与墙体得连接，应沿柱高每8皮砖（相当于500mm）放2 6钢筋，且每边伸入墙内不少于1m。 （5）施工时，先放钢筋骨架，再砌砖墙，最后浇注混凝土。（一般每砌筑一层或3m左右砖墙即灌注混凝土一次），这样做，既使构造柱与墙体结合牢固，又节省了模板。"},{"ch":"第六章 墙体","q":"简述墙体三种变形缝的异同。","a":"（1）设置目的。 伸缩缝：防止建筑受温度变化而引起变形，产生裂缝。 沉降缝：防止建筑物由于各部位沉降不均而引起结构变形、破坏。 防震缝：防止建筑物不同部位的刚度差异在地震冲击波的作用下给建筑物带来破坏。 （2）断开部位。 伸缩缝：从基础顶面开始，将墙体、楼板层、屋顶等地面以上构件全部断开，基础可不断开。 沉降缝：从基础到屋顶都要断开。 防震缝：从基础顶面开始，将墙体、楼板层、屋顶等地面以上构件全部断开，基础可不断开。在地震设防地区，当建筑物需设置伸缩缝或沉降缝时，应统一按防震缝对待。 （3）变形缝宽度： 伸缩缝：一般为20-30mm。应符合《砌体结构设计规范》有关规定。 沉降缝：与地基情况及建筑高度有关，一般为30-70mm，在软弱地基上的建筑其缝宽应适当增加。 防震缝：在多层砖墙房屋中，按设计烈度不同取50-70mm。 （4）构造图例：注意金属调节片的形状。（图例略） 普通砖隔墙"},{"ch":"第六章 墙体","q":"普通粘土砖的规格是多少？砖墙的实际厚度有哪五种？","a":"普通粘土砖的规格是240×115×53，砖墙的实际厚度有115、178（180）、240、"},{"ch":"第六章 墙体","q":"圈梁的作用是什么？钢筋混凝土圈梁的宽度和高度有什么要求？","a":".圈梁的作用是提高建筑物的空间刚度和整体性、增加墙体稳定、减少由于地基不均匀沉降而引起的墙体开裂，并防止较大振动荷载对建筑物的不良影响,钢筋混凝土圈梁的宽度一般应与墙体厚度相同，高度不小于120mm。"},{"ch":"基础","q":"影响基础埋置深度的因素有哪些？","a":"建筑物的使用要求；基础类型及荷载；工程地质和水文条件；土的冻结深度的影响；  相邻建筑物的埋深。"},{"ch":"基础","q":"基础按构造形式不同分为哪几种？各自的适用范围如何？","a":"分为单独基础  条形基础  井格基础  片筏基础  箱形基础   桩基础 单独基础：常用于柱下，也可用于墙下。 条形基础：常用于墙下，也可用于密集的柱下。 井格基础：常用于土质较弱或荷载较大的柱下。 片筏基础：常用于土质很弱的柱下或墙下。 箱形基础：用于荷载很大或浅层地质条件较差或下部需设地下室的建筑中。 桩基础：用于浅层地基上不能满足建筑物对地基承载力和变形的要求，而又不适于采取地基处理措施时的情况。"},{"ch":"基础","q":"基础和地基的定义？","a":"基础是建筑物的组成部分，它承受着建筑物的全部荷载，并将其传给地基。而地基并不是建筑物的组成部分，它只是承受建筑物荷载的土壤层。"},{"ch":"楼梯","q":"楼梯的作用及设计要求有哪些？","a":"楼梯的作用：交通与疏散 设计要求：①具有足够的通行能力，即保证有足够的宽度与合适的坡度。 ②保证楼梯通行安全，即有足够的强度，刚度，并具有防火、防烟、防滑的要求。 ③造型美观"},{"ch":"楼梯","q":"楼梯主要由哪些部分组成？各部分的作用和要求是什么？","a":"楼梯由三大组成部分 梯段----设有踏步供楼层间上下行走的通道段落。是楼梯的主要使用和承重部分。 踏步数量要求：不超过18级，不少于3级。 平台----连接两个相邻楼梯段的水平部分。 楼层平台：与楼层标高一致的平台 中间平台：介于两个相邻楼层之间的平台 作用：缓解疲劳，转向。 栏杆（栏板）和扶手----装设于楼梯段和平台的边缘 作用：栏杆起围护作用，扶手作依扶用。 栏杆扶手的设计，应考虑坚固、安全、适用和美观等"},{"ch":"楼梯","q":"当楼梯底层中间平台下做通道而平台净高不满足要求时，常采取哪些办法解决？","a":"①长短跑—将底层第一梯段增长，形成级数不等的梯段。 ②降低地面—降低楼梯间底层的室内地面标高。 ③综合法—将上述两种方法相结合。 ④底层直跑—底层用直跑楼梯，直达二楼。"},{"ch":"楼梯","q":"简述楼梯的设计步骤。","a":"①根据建筑物的类别和楼梯在平面中的位置，确定楼梯的形式 ②根据楼梯的性质和用途，确定楼梯的适宜坡度，选择踏步高h，踏步宽b ③根据通过的人数和楼梯间的尺寸确定楼梯间的楼梯段宽度B ④确定踏步级数。n=H/h。踏步数n为整数, H为房屋层高。结合楼梯形式，确定每个楼梯段的级数 ⑤确定楼梯平台的宽度B′ ⑥由初定的踏步宽度b确定楼梯段的水平投影长度 ⑦进行楼梯净空的计算，符合净空高度的要求 ⑧绘制楼梯平面图及剖面图"},{"ch":"楼梯","q":"当楼梯间的平台下要作为主要入口时，为了增加入口的高度，有哪几种处理方法？最好的是哪一种，为什么？","a":"当楼梯间的平台下要作为主要入口时，为了增加入口的高度，有以下几种处理方法： 一、增加室内外高差； 二、底层采用不等跑； 三、既增加室内外高差又采用不等跑； 四、底层采用单跑。 最好的处理方法是第一种，因为增加室内外高差可以提高底层的防潮能力，增加底层住户的安全感，对于梯段的尺度只有一种，便于设计与施工。"},{"ch":"楼地层","q":"楼地层的要求有哪些？","a":"具有足够的强度和刚度，满足隔声、热工、防火、防潮、防水、经济及敷设管线等要求。"},{"ch":"楼地层","q":"现浇钢筋混凝土楼板的特点和适用范围是什么？","a":"特点：具有整体性好、刚度大、利于抗震、梁板布置灵活等特点，但其模板耗材大、施工速度慢、施工受季节限制。 适用范围：地震区及平面形状不规则或防水要求较高的房间。"},{"ch":"楼地层","q":"预制钢筋混凝土楼板的特点是什么？常用的板型有哪几种？","a":"特点：可节省楼板、改善劳动条件、提高生产效率、加快施工速度并利于推广建筑工业化，但楼板的整体性差。 常用板型：实心板、空心板、槽形板等"},{"ch":"楼地层","q":"现浇钢筋混凝土肋梁楼板中各构件的构造尺寸范围是什么？","a":"一般情况下，主梁的经济跨度为 5～8 m，梁高为跨度的 1／8～l／14；梁宽为梁高的 1／2～1／3。 次梁的经济跨度为主梁的间距，即4～6m，次梁高为其跨度的 1／12～1／18，宽度为高度的1／3～1／2。 板的跨度为次梁的间距，一般为 1．5～3 m，厚度为其跨度的 1／40～1／45，且一般不小于60mm。"},{"ch":"楼地层","q":"简述实铺木地面的构造要点。","a":"①先在基层上刷冷底子油一道，热沥青玛统指两道； ②在基层上钉小搁栅，常为50mm X 60mm方水，中距 40mm； ③在小搁栅上钉木地板，此时将钉从板侧边钉人木搁栅，板面不留钉孔，木板的端缝应互相错开。"},{"ch":"屋顶","q":"简述屋面排水设计步骤。","a":"（1）确定屋面排水坡面的数目，坡度的形成方法和坡度大小。 （2）选择排水方式，划分排水分区。 （3）确定天沟断面形式及尺寸 （4）确定雨水管所用材料，大小和间距，绘制屋顶排水平面图"},{"ch":"屋顶","q":"简述卷材防水屋面基本构造层次及作用。","a":"（1）结构层：预制或现浇钢筋混凝土屋面板。应具有足够的强度和刚度。 （2）找平层：为了使防水卷才能铺贴在平整的基层上。 （3）结合层：使卷材防水层与找平层粘结牢固。 （4）防水层：卷材防水屋面的主要构造层次，用防水卷材和胶结材料交替粘结而形成。 （5）保护层：保护防水层不致因日照和气候等的作用迅速老化，从而延长防水层的使用耐久年限。"},{"ch":"屋顶","q":"简述卷材防水屋面泛水构造要点。","a":"（1）将屋面的卷材防水层材采取满粘法继续铺至垂直面上，形成卷材泛水，并加铺一层卷材 （2）泛水应有一定的高度，迎水面不低于250mm,背水面不低于180mm （3）屋面与垂直面交接处应做成45°斜面或圆弧，圆弧半径应根据卷材种类不同选用，一般为50～100mm （4）做好泛水的收头固定"},{"ch":"屋顶","q":"简述刚性防水屋面的基本构造层次及作用。","a":"（1）结构层 预制或现浇钢筋混凝土屋面板。应具有足够的强度和刚度。 （2）找平层：保证防水层厚薄均匀 （3）隔离层：为减少结构层变形及温度变化对防水层的不利影响，设于防水层之下，又叫浮筑层。 （4）防水层：刚性防水屋面的主要构造层次。可采用防水砂浆抹面或现浇配筋细石混凝土的做法。"},{"ch":"门窗","q":"木门窗框的安装方法有哪两种？各有何优缺点？","a":"（1）立口法：是当墙砌到窗洞口高度时，先安装门窗框，再砌墙。优点：窗框与墙体结合紧密牢固。缺点：墙体施工与框的安装互相影响，窗框及其临时支撑易被碰撞，有时还会产生移位破损 （2）塞口法：是砌墙时先预留出窗洞口，然后再安装窗框。优点：墙体施工与门窗安装分 行，可避免相互干扰。缺点：墙体与窗框之间的缝隙较大。"}];
var chapters = {};
data.forEach(function(q, i){ if(!chapters[q.ch]) chapters[q.ch]=[]; chapters[q.ch].push(i); });

function render(){
  var kw=document.getElementById('search').value.toLowerCase();
  var h=''; var idx=0;
  Object.keys(chapters).forEach(function(ch){
    var ids=chapters[ch].filter(function(i){return data[i].q.toLowerCase().includes(kw)});
    if(!ids.length)return;
    h+='<div class="chapter-block"><div class="chapter-title">'+ch+'</div>';
    ids.forEach(function(j){
      idx++; var qq=data[j];
      h+='<div class="q-item"><div class="q-text"><span class="q-num">'+idx+'</span>'+qq.q+'</div>';
      if(qq.a) h+='<button class="toggle-btn" onclick="toggleAns(this)">显示答案</button><div class="answer-box">'+qq.a.replace(/\n/g,'<br>')+'</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  document.getElementById('content').innerHTML=h;
}

function toggleAns(btn){
  var box=btn.nextElementSibling;
  if(box.classList.contains('show')){ box.classList.remove('show'); btn.textContent='显示答案'; }
  else { box.classList.add('show'); btn.textContent='隐藏答案'; }
}

function toggleAll(){
  var all=document.querySelectorAll('.answer-box');
  var showCount=0; all.forEach(function(b){if(b.classList.contains('show'))showCount++});
  var expand=showCount < all.length;
  all.forEach(function(b){if(expand) b.classList.add('show'); else b.classList.remove('show');});
  document.querySelectorAll('.toggle-btn').forEach(function(b){b.textContent=expand?'隐藏答案':'显示答案';});
}

function filterQ(){render()}
render();
</script>
